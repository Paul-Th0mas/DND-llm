services:
  app:
    # Builds the image from the Dockerfile in the current directory
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: dnd-frontend:latest
    container_name: dnd-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Add public env vars here, e.g:
      # - NEXT_PUBLIC_API_URL=https://api.example.com
    restart: unless-stopped
