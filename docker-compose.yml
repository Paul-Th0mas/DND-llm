services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dnd_db
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      # Override DATABASE_URL so the app connects to the db service, not localhost
      DATABASE_URL: postgresql://postgres:admin@db:5432/dnd_db
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
